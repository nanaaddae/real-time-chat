spring.application.name=chat-service

# Application Configuration
server.port=${PORT:8080}

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:file:./data/chatdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# For Production PostgreSQL (uncomment and configure)
# spring.datasource.url=jdbc:postgresql://localhost:5432/chatdb
# spring.datasource.username=your_username
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For PostgreSQL use: org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-default-dev-key-here}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://real-time-chat-1-0fqx.onrender.com

# Logging
logging.level.com.chatapp=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG